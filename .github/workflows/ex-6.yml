# This workflow packages the verified app.
# It runs verification first, then packaging depends on it using `needs`.

name: 03 Build Artifact Workflow ex6

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image

jobs:
  verify:
    name: Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-package:
    name: Build Docker Image
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Save Docker image as tar
        run: |
          docker save \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            -o "${IMAGE_TAR}"

      - name: Save image metadata
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          echo "IMAGE_TAG=${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          echo "IMAGE_REFERENCE=${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7
